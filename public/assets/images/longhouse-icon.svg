<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Longhouse icon">
  <defs>
    <mask id="helmetMask">
      <!-- White = show, black = cut out -->
      <rect width="200" height="200" fill="white"/>
      <!-- Visor cutout -->
      <rect x="52" y="77" rx="10" ry="10" width="96" height="51" fill="black"/>
      <!-- Panel lines as fine dark cuts -->
      <path d="M100 30 Q100 60 100 80" stroke="black" stroke-width="4" fill="none"/>
      <path d="M60 50 Q80 70 100 80" stroke="black" stroke-width="3" fill="none"/>
      <path d="M140 50 Q120 70 100 80" stroke="black" stroke-width="3" fill="none"/>
      <path d="M70 150 Q100 165 130 150" stroke="black" stroke-width="3" fill="none"/>
    </mask>
  </defs>

  <!-- Helmet body (white, masked) -->
  <g mask="url(#helmetMask)" fill="white">
    <ellipse cx="100" cy="105" rx="65" ry="75"/>
    <ellipse cx="42" cy="115" rx="18" ry="30"/>
    <ellipse cx="158" cy="115" rx="18" ry="30"/>
    <path d="M55 145 Q100 185 145 145 L140 165 Q100 195 60 165 Z"/>
  </g>

  <!-- Zerg marks inside visor (white dots + connectors on transparent bg) -->
  <g fill="white">
    <ellipse cx="100" cy="88" rx="9" ry="7"/>
    <ellipse cx="78" cy="110" rx="10" ry="8"/>
    <ellipse cx="122" cy="110" rx="10" ry="8"/>
  </g>
  <g stroke="white" stroke-width="2.5" fill="none" opacity="0.8">
    <line x1="93" y1="93" x2="83" y2="104"/>
    <line x1="107" y1="93" x2="117" y2="104"/>
    <line x1="88" y1="113" x2="112" y2="113"/>
  </g>
</svg>
